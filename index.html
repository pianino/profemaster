<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profe Master - MPJ GOLD V3.1</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; padding: 20px; display: flex; flex-direction: column; min-height: 100vh; margin: 0; }
        header { border-bottom: 2px solid #008000; padding-bottom: 10px; margin-bottom: 15px; text-align: center; }
        h1 { margin: 0; color: #008000; font-size: 2.2em; text-transform: uppercase; }
        #reloj { font-size: 1.2em; color: #fbbf24; margin-bottom: 5px; font-weight: bold; }
        .estado { font-size: 0.9em; font-weight: bold; color: #00ff00; margin-bottom: 10px; }
        .btn-test { background: #443300; color: #fbbf24; border: 1px solid #fbbf24; padding: 5px 10px; font-size: 0.7em; cursor: pointer; border-radius: 5px; margin-top: 5px; }
        .vista { display: none; flex-grow: 1; width: 100%; }
        .activa { display: block; }
        label { display: block; margin: 15px 0 8px; font-weight: bold; font-size: 1.2em; color: #008000; }
        input { width: 100%; padding: 18px; background: #1a1a1a; border: 2px solid #333; color: #fff; border-radius: 12px; font-size: 1.2em; box-sizing: border-box; }
        .dia { display: flex; align-items: center; margin: 15px 0; font-size: 1.3em; }
        input[type="checkbox"] { width: 35px; height: 35px; margin-right: 15px; }
        .btn { width: 100%; padding: 20px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 1.2em; margin-top: 15px; }
        .btn-verde { background: #008000; color: white; }
        .btn-nav { background: #333; color: white; margin-bottom: 25px; }
        .btn-rojo { background: #800000; color: white; display: none; margin-top: 20px; }
        .tarjeta { padding: 20px; border-left: 12px solid #008000; margin-bottom: 18px; background: #151515; border-radius: 12px; position: relative; }
        .alerta-45 { border-left-color: #fbbf24; background: #221a00; } 
        .tarjeta-activa { border-left-color: #00ff00; background: #001a00; }
        .clase-espera { border-left-color: #ff0000; background: #2a0000; animation: parpadeo 1.5s infinite; }
        @keyframes parpadeo { 50% { opacity: 0.6; } }
        .btn-edit-card { background: #1e3a8a; color: white; padding: 10px 15px; border-radius: 8px; border: none; float: right; font-weight: bold; }
        footer { margin-top: auto; padding: 25px 0; border-top: 1px solid #333; text-align: center; color: #666; font-size: 0.8em; }
    </style>
</head>
<body>
    <header>
        <h1>Profe Master</h1>
        <div id="reloj">Cargando...</div>
        <div id="status" class="estado">● SISTEMA ONLINE (TINY HOST)</div>
        <button class="btn-test" onclick="playAlarmaMaster()">PROBAR SONIDO YM-2413</button>
    </header>

    <button class="btn btn-nav" onclick="cambiarVista()" id="btnVista">VER LISTA DE ALUMNOS</button>

    <div id="vistaRegistro" class="vista activa">
        <input type="hidden" id="editIndex" value="-1">
        <label>Nombre del Alumno:</label>
        <input type="text" id="nombreAlumno">
        <label>Hora de Inicio:</label>
        <input type="time" id="horaClase">
        <label>Días:</label>
        <div id="diasGrupo">
            <label class="dia"><input type="checkbox" value="Lunes"> Lunes</label>
            <label class="dia"><input type="checkbox" value="Martes"> Martes</label>
            <label class="dia"><input type="checkbox" value="Miércoles"> Miércoles</label>
            <label class="dia"><input type="checkbox" value="Jueves"> Jueves</label>
            <label class="dia"><input type="checkbox" value="Viernes"> Viernes</label>
            <label class="dia"><input type="checkbox" value="Sábado"> Sábado</label>
        </div>
        <button id="btnGuardar" class="btn btn-verde" onclick="guardar()">GUARDAR</button>
        <button id="btnBorrar" class="btn btn-rojo" onclick="eliminarAlumno()">ELIMINAR ALUMNO</button>
    </div>

    <div id="vistaEventos" class="vista">
        <div id="listaEventos"></div>
    </div>

    <footer>MusicArte | MPJ Factory 2026</footer>

    <script>
        const fmCfg = { harmonicity: 3.01, modulationIndex: 14, oscillator: { type: "sine" }, envelope: { attack: 0.001, decay: 2.5, sustain: 0.05, release: 4.0 } };
        const engineA = new Tone.PolySynth(Tone.FMSynth, fmCfg).toDestination();
        const engineB = new Tone.PolySynth(Tone.FMSynth, fmCfg).toDestination();
        engineB.set({ detune: -12 });

        // LISTA DE ALUMNOS (Aquí es donde TinyHost hace la magia si editas el archivo)
        let alumnos = JSON.parse(localStorage.getItem('profe_master_backup') || "[]");
        let avisosDados = new Set();

        async function playAlarmaMaster() {
            await Tone.start();
            const now = Tone.now();
            ["E4", "C#4", "E4", "A4"].forEach((n, i) => {
                [0, 2.5].forEach(off => {
                    engineA.triggerAttackRelease(n, "4n", now + off + (i * 0.5));
                    engineB.triggerAttackRelease(n, "4n", now + off + (i * 0.5));
                });
            });
        }

        function actualizarReloj() {
            const ahora = new Date();
            const hStr = ahora.toLocaleTimeString('es-ES', {hour:'2-digit', minute:'2-digit'});
            document.getElementById('reloj').innerText = ahora.toLocaleDateString('es-ES', {weekday:'long', day:'numeric'}) + ", " + hStr;
            const hoy = ["Domingo", "Lunes", "Martes", "Miércoles", "Jueves", "Viernes", "Sábado"][ahora.getDay()];
            alumnos.forEach(a => {
                if (a.dias.includes(hoy) && a.hora === hStr && !avisosDados.has(a.nombre + hStr)) {
                    playAlarmaMaster();
                    avisosDados.add(a.nombre + hStr);
                }
            });
            render();
        }

        function render() {
            const ahora = new Date();
            const hoy = ["Domingo", "Lunes", "Martes", "Miércoles", "Jueves", "Viernes", "Sábado"][ahora.getDay()];
            const cont = document.getElementById('listaEventos');
            cont.innerHTML = alumnos.map((a, i) => {
                if (!a.dias.includes(hoy)) return "";
                const [h, m] = a.hora.split(':').map(Number);
                const dc = new Date(); dc.setHours(h, m, 0);
                const diff = (dc - ahora) / 60000;
                if (diff < -30) return "";
                let estilo = ""; let msg = "En espera";
                if (diff <= 45 && diff > 0) { estilo = "alerta-45"; msg = "⚠️ TARJETAS (45m)"; }
                if (diff <= 0 && diff >= -15) { estilo = "tarjeta-activa"; msg = "● EN CLASE"; }
                return `<div class="tarjeta ${estilo}"><button class="btn-edit-card" onclick="editar(${i})">EDITAR</button><strong>${a.nombre}</strong><br>${a.hora} | ${msg}</div>`;
            }).join('') || "No hay más clases hoy.";
        }

        function guardar() {
            const n = document.getElementById('nombreAlumno').value;
            const h = document.getElementById('horaClase').value;
            const d = Array.from(document.querySelectorAll('#diasGrupo input:checked')).map(c => c.value);
            const idx = parseInt(document.getElementById('editIndex').value);
            if(!n || !h || d.length === 0) return alert("Faltan datos");
            if(idx === -1) alumnos.push({nombre:n, hora:h, dias:d});
            else alumnos[idx] = {nombre:n, hora:h, dias:d};
            localStorage.setItem('profe_master_backup', JSON.stringify(alumnos));
            cambiarVista();
        }

        function editar(i) {
            const a = alumnos[i];
            document.getElementById('editIndex').value = i;
            document.getElementById('nombreAlumno').value = a.nombre;
            document.getElementById('horaClase').value = a.hora;
            document.querySelectorAll('#diasGrupo input').forEach(c => c.checked = a.dias.includes(c.value));
            document.getElementById('btnBorrar').style.display = "block";
            document.getElementById('btnGuardar').innerText = "ACTUALIZAR ALUMNO";
            cambiarVista();
        }

        function eliminarAlumno() {
            const idx = parseInt(document.getElementById('editIndex').value);
            if(confirm("¿Eliminar?")) {
                alumnos.splice(idx, 1);
                localStorage.setItem('profe_master_backup', JSON.stringify(alumnos));
                cambiarVista();
            }
        }

        function cambiarVista() {
            const reg = document.getElementById('vistaRegistro');
            const evt = document.getElementById('vistaEventos');
            const btn = document.getElementById('btnVista');
            if (reg.classList.contains('activa')) {
                reg.classList.remove('activa'); evt.classList.add('activa');
                btn.innerText = "AÑADIR NUEVO ALUMNO";
            } else {
                evt.classList.remove('activa'); reg.classList.add('activa');
                btn.innerText = "VOLVER A LA LISTA";
                limpiar();
            }
        }

        function limpiar() {
            document.getElementById('editIndex').value = "-1";
            document.getElementById('nombreAlumno').value = "";
            document.getElementById('horaClase').value = "";
            document.querySelectorAll('#diasGrupo input').forEach(c => c.checked = false);
            document.getElementById('btnBorrar').style.display = "none";
            document.getElementById('btnGuardar').innerText = "GUARDAR";
        }

        setInterval(actualizarReloj, 1000);
        window.onload = render;
    </script>
</body>
</html>
