<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROFE MASTER FINAL</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        :root { --verde: #2d5a27; --oro: #d4af37; --fondo: #121212; }
        body { background: var(--fondo); color: white; font-family: sans-serif; padding: 20px; }
        .card { background: #1e1e1e; padding: 15px; border-radius: 12px; border: 1px solid #333; margin-bottom: 20px; }
        #reloj { font-size: 3rem; text-align: center; color: var(--oro); font-family: monospace; margin: 10px 0; }
        input { width: 100%; padding: 12px; margin: 5px 0; background: #2a2a2a; border: 1px solid var(--verde); border-radius: 8px; color: white; box-sizing: border-box; }
        .btn { background: var(--verde); color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        /* TABLA DE ALUMNOS */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; color: var(--oro); border-bottom: 2px solid #333; padding: 10px; }
        td { padding: 12px; border-bottom: 1px solid #222; }
        .btn-del { background: #aa0000; color: white; border: none; padding: 5px 10px; border-radius: 4px; }

        #inicio { position: fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:10000; display:flex; align-items:center; justify-content:center; }
    </style>
</head>
<body>

<div id="inicio">
    <button class="btn" style="width:80%; height:80px; font-size:1.5rem;" onclick="activar()">ACTIVAR SISTEMA</button>
</div>

<div class="card">
    <div id="reloj">00:00:00</div>
    <button class="btn" style="background:#444;" onclick="probarAlarma()">PROBAR SONIDO AHORA</button>
</div>

<div class="card">
    <h3>Nuevo Alumno</h3>
    <input type="text" id="nom" placeholder="Nombre del Alumno">
    <input type="time" id="hor">
    <button class="btn" onclick="agregar()">AÑADIR A LA LISTA</button>
</div>

<div class="card">
    <h3>Lista de Clases</h3>
    <table>
        <thead>
            <tr>
                <th>Alumno</th>
                <th>Hora</th>
                <th>Acción</th>
            </tr>
        </thead>
        <tbody id="cuerpoTabla"></tbody>
    </table>
</div>

<div class="card" style="border-style: dashed;">
    <h3>Sincronizar (PC ↔ iPhone)</h3>
    <textarea id="syncBox" style="width:100%; background:#000; color:#0f0;" rows="3" placeholder="Pega el código aquí..."></textarea>
    <button class="btn" style="background:#333;" onclick="exportar()">1. COPIAR DATOS</button>
    <button class="btn" style="background:#333;" onclick="importar()">2. PEGAR Y ACTUALIZAR</button>
</div>

<script>
    let sintetizador;
    let alumnos = JSON.parse(localStorage.getItem('pm_data_final') || "[]");

    async function activar() {
        await Tone.start();
        sintetizador = new Tone.PolySynth(Tone.Synth).toDestination();
        document.getElementById('inicio').style.display = 'none';
        actualizarVista();
    }

    function agregar() {
        const n = document.getElementById('nom').value;
        const h = document.getElementById('hor').value;
        if(n && h) {
            alumnos.push({n, h});
            guardarYRefrescar();
            document.getElementById('nom').value = "";
        }
    }

    function guardarYRefrescar() {
        localStorage.setItem('pm_data_final', JSON.stringify(alumnos));
        actualizarVista();
    }

    function actualizarVista() {
        const tabla = document.getElementById('cuerpoTabla');
        tabla.innerHTML = alumnos.sort((a,b)=>a.h.localeCompare(b.h)).map((a, i) => `
            <tr>
                <td><b>${a.n}</b></td>
                <td>${a.h}</td>
                <td><button class="btn-del" onclick="eliminar(${i})">Eliminar</button></td>
            </tr>
        `).join('');
    }

    function eliminar(i) {
        alumnos.splice(i, 1);
        guardarYRefrescar();
    }

    function probarAlarma() {
        if(!sintetizador) return;
        const ahora = Tone.now();
        sintetizador.triggerAttackRelease("C4", "8n", ahora);
        sintetizador.triggerAttackRelease("E4", "8n", ahora + 0.1);
        sintetizador.triggerAttackRelease("G4", "4n", ahora + 0.2);
    }

    setInterval(() => {
        const d = new Date();
        const t = d.toLocaleTimeString('es-ES', {hour12:false});
        document.getElementById('reloj').innerText = t;
        if(d.getSeconds() === 0) {
            const hActual = t.substring(0,5);
            if(alumnos.some(a => a.h === hActual)) probarAlarma();
        }
    }, 1000);

    function exportar() {
        const cod = btoa(JSON.stringify(alumnos));
        document.getElementById('syncBox').value = cod;
        document.getElementById('syncBox').select();
        document.execCommand('copy');
        alert("¡Copiado! Pégalo en el otro dispositivo.");
    }

    function importar() {
        try {
            const cod = document.getElementById('syncBox').value;
            alumnos = JSON.parse(atob(cod));
            guardarYRefrescar();
            alert("¡Sincronizado!");
        } catch(e) { alert("Código inválido"); }
    }
</script>
</body>
</html>
