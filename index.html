<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PROFE MASTER - TINY EDITION</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        :root { --verde: #2d5a27; --oro: #d4af37; --fondo: #121212; --texto: #e0e0e0; }
        body { background: var(--fondo); color: var(--texto); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 20px; box-sizing: border-box; }
        
        /* PANTALLA DE INICIO */
        #pantalla-inicio { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--fondo); z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .btn-grande { background: var(--verde); color: white; border: none; padding: 25px 50px; font-size: 22px; font-weight: bold; border-radius: 50px; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }

        /* RELOJ */
        .header { text-align: center; border-bottom: 2px solid var(--verde); padding-bottom: 10px; margin-bottom: 20px; }
        #reloj { font-size: 3.5rem; font-family: 'Courier New', monospace; color: var(--oro); }

        /* FORMULARIO */
        .seccion { background: #1e1e1e; padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #333; }
        input, textarea { width: 100%; padding: 15px; margin: 10px 0; background: #2a2a2a; border: 1px solid #444; border-radius: 8px; color: white; font-size: 16px; box-sizing: border-box; }
        .btn-accion { background: var(--verde); color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; font-size: 18px; cursor: pointer; }
        
        /* LISTA ALUMNOS */
        .alumno { background: #1a1a1a; border-left: 6px solid var(--oro); padding: 15px; margin-bottom: 10px; border-radius: 5px; display: flex; justify-content: space-between; align-items: center; }
        .info-alumno { display: flex; flex-direction: column; }
        .nombre-alumno { font-weight: bold; font-size: 1.2rem; color: var(--oro); }
        .hora-alumno { font-size: 0.9rem; color: #888; }
        .btn-borrar { background: none; border: none; color: #ff5555; font-size: 24px; cursor: pointer; padding: 10px; }

        /* SYNC */
        .sync-area { font-size: 12px; color: #777; margin-top: 10px; }
    </style>
</head>
<body>

<div id="pantalla-inicio">
    <h1 style="color: var(--oro);">PROFE MASTER</h1>
    <p>Sistema de Gestión Musical</p>
    <button class="btn-grande" onclick="iniciarSistema()">ACTIVAR SISTEMA</button>
</div>

<div class="header">
    <div id="reloj">00:00:00</div>
</div>

<div class="seccion">
    <input type="text" id="inNombre" placeholder="Nombre del Alumno" aria-label="Nombre del Alumno">
    <input type="time" id="inHora" aria-label="Hora de la clase">
    <button class="btn-accion" onclick="agregarAlumno()">GUARDAR ALUMNO</button>
</div>

<div id="contenedor-lista"></div>

<div class="seccion" style="margin-top: 40px; border-color: #444;">
    <h3 style="margin-top: 0;">Sincronización Accesible</h3>
    <textarea id="syncBox" rows="3" placeholder="Pega el código aquí para importar..."></textarea>
    <button class="btn-accion" onclick="exportarDatos()" style="background: #444; margin-bottom: 10px;">1. COPIAR LISTA ACTUAL</button>
    <button class="btn-accion" onclick="importarDatos()" style="background: #444;">2. PEGAR Y SINCRONIZAR</button>
</div>

<script>
    let sintetizador;
    let alumnos = JSON.parse(localStorage.getItem('profe_master_v3') || "[]");

    // --- INICIO ---
    async function iniciarSistema() {
        await Tone.start();
        sintetizador = new Tone.PolySynth(Tone.Synth, {
            oscillator: { type: "triangle" },
            envelope: { attack: 0.1, decay: 0.2, sustain: 0.5, release: 1 }
        }).toDestination();
        
        document.getElementById('pantalla-inicio').style.display = 'none';
        render();
    }

    // --- LOGICA ALUMNOS ---
    function agregarAlumno() {
        const n = document.getElementById('inNombre').value;
        const h = document.getElementById('inHora').value;
        if (n && h) {
            alumnos.push({ nombre: n, hora: h });
            guardarYRefrescar();
            document.getElementById('inNombre').value = "";
        }
    }

    function borrarAlumno(index) {
        alumnos.splice(index, 1);
        guardarYRefrescar();
    }

    function guardarYRefrescar() {
        localStorage.setItem('profe_master_v3', JSON.stringify(alumnos));
        render();
    }

    function render() {
        const lista = document.getElementById('contenedor-lista');
        lista.innerHTML = "";
        
        // Ordenar por hora
        alumnos.sort((a, b) => a.hora.localeCompare(b.hora)).forEach((a, i) => {
            lista.innerHTML += `
                <div class="alumno">
                    <div class="info-alumno">
                        <span class="nombre-alumno">${a.nombre}</span>
                        <span class="hora-alumno">Clase a las: ${a.hora}</span>
                    </div>
                    <button class="btn-borrar" onclick="borrarAlumno(${i})" aria-label="Eliminar a ${a.nombre}">✕</button>
                </div>
            `;
        });
    }

    // --- ALARMA Y RELOJ ---
    setInterval(() => {
        const ahora = new Date();
        const tiempoStr = ahora.toLocaleTimeString('es-ES', { hour12: false });
        document.getElementById('reloj').innerText = tiempoStr;

        if (ahora.getSeconds() === 0) {
            const horaActual = tiempoStr.substring(0, 5);
            const hayClase = alumnos.some(a => a.hora === horaActual);
            if (hayClase) sonarAlarma();
        }
    }, 1000);

    function sonarAlarma() {
        if (!sintetizador) return;
        const ahora = Tone.now();
        sintetizador.triggerAttackRelease("E4", "8n", ahora);
        sintetizador.triggerAttackRelease("G4", "8n", ahora + 0.25);
        sintetizador.triggerAttackRelease("C5", "2n", ahora + 0.5);
    }

    // --- SINCRONIZACIÓN (OPCIÓN 2) ---
    function exportarDatos() {
        const datosTexto = btoa(JSON.stringify(alumnos)); // Convertimos a Base64 para que sea un solo bloque
        const box = document.getElementById('syncBox');
        box.value = datosTexto;
        box.select();
        document.execCommand('copy');
        alert("¡Lista copiada al portapapeles! Envíala por WhatsApp o Mail al otro dispositivo.");
    }

    function importarDatos() {
        try {
            const texto = document.getElementById('syncBox').value;
            const nuevosAlumnos = JSON.parse(atob(texto));
            if (Array.isArray(nuevosAlumnos)) {
                alumnos = nuevosAlumnos;
                guardarYRefrescar();
                alert("¡Sincronización completada con éxito!");
            }
        } catch (e) {
            alert("Error: El código de sincronización no es válido.");
        }
    }
</script>

</body>
</html>
