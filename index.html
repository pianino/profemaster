<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profe Master - NUBE REAL</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 20px; margin: 0; text-align: center; }
        h1 { color: #008000; text-transform: uppercase; }
        #reloj { font-size: 1.2em; color: #fbbf24; margin: 15px 0; font-weight: bold; }
        .estado { font-size: 0.8em; color: #00ff00; margin-bottom: 20px; }
        .vista { display: none; }
        .activa { display: block; }
        input, button { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: none; font-size: 1.1em; box-sizing: border-box; }
        input { background: #1a1a1a; color: #fff; border: 1px solid #333; }
        .btn-verde { background: #008000; color: #fff; font-weight: bold; }
        .btn-nav { background: #333; color: #fff; }
        .tarjeta { background: #111; border-left: 10px solid #008000; padding: 20px; margin-bottom: 15px; border-radius: 12px; text-align: left; position: relative; }
        .alerta-45 { border-left-color: #fbbf24; background: #221a00; }
        .en-clase { border-left-color: #00ff00; background: #001a00; }
        .btn-del { background: #800000; color: white; width: auto; padding: 5px 10px; position: absolute; right: 10px; top: 10px; font-size: 0.7em; }
    </style>
</head>
<body>

    <h1>Profe Master</h1>
    <div id="reloj">Cargando...</div>
    <div id="status" class="estado">Conectando a la nube...</div>

    <button class="btn-nav" onclick="cambiarVista()" id="btnNav">VER LISTA DE ALUMNOS</button>

    <div id="vistaRegistro" class="vista activa">
        <input type="text" id="nombre" placeholder="Nombre del Alumno">
        <input type="time" id="hora">
        <input type="text" id="dias" placeholder="Días (Lunes, Martes...)">
        <button class="btn-verde" onclick="guardar()">GUARDAR EN LA NUBE</button>
    </div>

    <div id="vistaLista" class="vista">
        <div id="listaEventos">Cargando alumnos...</div>
    </div>

    <script>
        // CONFIGURACIÓN DE LA NUBE (JSONBin.io)
        const BIN_ID = "65f0a69a2662c34d318721c1"; // Caja creada para ti
        const API_KEY = "$2a$10$7Z/YF8C3Z2A1F/6.H.S6aeXJ.fWvH4hX9k/2s7S.vN8kRj3Y6Zz/i";
        const URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

        // MOTOR YM-2413
        const fmCfg = { harmonicity: 3.01, modulationIndex: 14, oscillator: { type: "sine" }, envelope: { attack: 0.001, decay: 2.5, sustain: 0.05, release: 4.0 } };
        const engineA = new Tone.PolySynth(Tone.FMSynth, fmCfg).toDestination();
        const engineB = new Tone.PolySynth(Tone.FMSynth, fmCfg).toDestination();
        engineB.set({ detune: -12 });

        let alumnos = [];
        let avisosDados = new Set();

        async function cargarDesdeNube() {
            try {
                const res = await fetch(URL, { headers: { "X-Master-Key": API_KEY }});
                const data = await res.json();
                alumnos = data.record.alumnos || [];
                document.getElementById('status').innerText = "● NUBE SINCRONIZADA";
                render();
            } catch (e) {
                document.getElementById('status').innerText = "❌ ERROR DE CONEXIÓN";
            }
        }

        async function guardarEnNube() {
            document.getElementById('status').innerText = "Guardando...";
            await fetch(URL, {
                method: 'PUT',
                headers: { "Content-Type": "application/json", "X-Master-Key": API_KEY },
                body: JSON.stringify({ alumnos: alumnos })
            });
            document.getElementById('status').innerText = "● NUBE SINCRONIZADA";
        }

        async function playAlarma() {
            await Tone.start();
            const now = Tone.now();
            ["E4", "C#4", "E4", "A4"].forEach((n, i) => {
                [0, 2.5].forEach(off => {
                    engineA.triggerAttackRelease(n, "4n", now + off + (i * 0.5));
                    engineB.triggerAttackRelease(n, "4n", now + off + (i * 0.5));
                });
            });
        }

        function guardar() {
            const n = document.getElementById('nombre').value;
            const h = document.getElementById('hora').value;
            const d = document.getElementById('dias').value.split(',').map(s => s.trim());
            if(!n || !h) return alert("Faltan datos");
            
            alumnos.push({ nombre: n, hora: h, dias: d });
            guardarEnNube();
            render();
            cambiarVista();
        }

        function eliminar(idx) {
            if(confirm("¿Eliminar?")) {
                alumnos.splice(idx, 1);
                guardarEnNube();
                render();
            }
        }

        function render() {
            const ahora = new Date();
            const hoy = ["Domingo", "Lunes", "Martes", "Miércoles", "Jueves", "Viernes", "Sábado"][ahora.getDay()];
            const hActual = ahora.toLocaleTimeString('es-ES', {hour:'2-digit', minute:'2-digit'});
            document.getElementById('reloj').innerText = hoy + ", " + hActual;

            const cont = document.getElementById('listaEventos');
            cont.innerHTML = "";

            alumnos.forEach((a, idx) => {
                if (!a.dias.includes(hoy)) return;
                const [h, m] = a.hora.split(':').map(Number);
                const dc = new Date(); dc.setHours(h, m, 0);
                const diff = (dc - ahora) / 60000;

                if (a.hora === hActual && !avisosDados.has(a.nombre + hActual)) {
                    playAlarma();
                    avisosDados.add(a.nombre + hActual);
                }

                let clase = ""; let texto = "En espera";
                if (diff <= 45 && diff > 0) { clase = "alerta-45"; texto = "⚠️ TARJETAS (45m)"; }
                if (diff <= 0 && diff >= -15) { clase = "en-clase"; texto = "● EN CLASE"; }

                cont.innerHTML += `<div class="tarjeta ${clase}">
                    <button class="btn-del" onclick="eliminar(${idx})">X</button>
                    <strong>${a.nombre}</strong><br>${a.hora} | ${texto}
                </div>`;
            });
        }

        function cambiarVista() {
            const reg = document.getElementById('vistaRegistro');
            const lista = document.getElementById('vistaLista');
            const btn = document.getElementById('btnNav');
            if (reg.classList.contains('activa')) {
                reg.classList.remove('activa'); lista.classList.add('activa');
                btn.innerText = "AÑADIR NUEVO ALUMNO";
            } else {
                lista.classList.remove('activa'); reg.classList.add('activa');
                btn.innerText = "VER LISTA DE ALUMNOS";
            }
        }

        setInterval(render, 1000);
        window.onload = cargarDesdeNube;
    </script>
</body>
</html>
